services:
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: vyaya-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=/app/data/vyaya.db
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DATA_DIR=/app/data
      - RECEIPTS_DIR=/app/data/receipts
    volumes:
      - /mnt/applications/vyaya/config:/app/data
      - /mnt/applications/vyaya/storage:/app/data/receipts
    expose:
      - "8000"
    networks:
      - internal_network
      - proxy_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vyaya-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - internal_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 300s
      timeout: 10s
      retries: 3

networks:
  internal_network:
    external: true
  proxy_network:
    external: true