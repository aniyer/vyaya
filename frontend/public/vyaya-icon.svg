<!-- Vyaya Logo - Gold Glassmorphism on Dark Grey - PWA Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark grey gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a" />
      <stop offset="50%" style="stop-color:#222222" />
      <stop offset="100%" style="stop-color:#2d2d2d" />
    </linearGradient>
    
    <!-- Outer glow effect -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0.15" />
    </linearGradient>
    
    <!-- Inner glow -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:0.2" />
    </linearGradient>
    
    <!-- Main gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3" />
      <stop offset="35%" style="stop-color:#E8C896" />
      <stop offset="65%" style="stop-color:#D4A574" />
      <stop offset="100%" style="stop-color:#C9A961" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)" />
  
  <!-- Outer glow layer -->
  <path d="M110 130 L256 410 L402 130" fill="none" stroke="url(#glowGrad)" stroke-width="100" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner glow layer -->
  <path d="M125 140 L256 395 L387 140" fill="none" stroke="url(#innerGlow)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Main V stroke -->
  <path d="M145 155 L256 375 L367 155" fill="none" stroke="url(#goldGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Highlight accent -->
  <path d="M155 160 L200 250" fill="none" stroke="#F5DEB3" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>
