<!-- Option 4: Gold/Brown glassmorphism on dark grey -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vGrad4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0.25" />
    </linearGradient>
    <linearGradient id="vGrad4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad4)" />
  <!-- Glow layer -->
  <path d="M120 140 L256 400 L392 140" fill="none" stroke="url(#vGrad4a)" stroke-width="90" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Main V with gold gradient -->
  <path d="M140 150 L256 380 L372 150" fill="none" stroke="url(#vGrad4b)" stroke-width="50" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
